<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Визитка | Привет!</title>
    <style>
        /* Стиль для красоты */
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* Красивый градиент */
            color: white;
            text-align: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px); /* Эффект матового стекла */
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 350px;
        }
        h1 { margin-bottom: 10px; font-size: 28px; }
        p { font-size: 18px; opacity: 0.9; }
        .links { margin-top: 25px; }
        .btn {
            display: block;
            background: white;
            color: #764ba2;
            padding: 12px;
            margin: 10px 0;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            background: #f0f0f0;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Твое Имя</h1>
        <p>Занимаюсь крутыми штуками, делаю сайты и запускаю игры 🚀</p>
        
        <div class="links">
            <a href="https://t.me" class="btn">Написать в Telegram</a>
            <a href="https://github.com" class="btn">Мой GitHub</a>
        </div>
    </div>

</body>
</html>
